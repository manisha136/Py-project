<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>InstaScreen</title>

    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #06B6D4;
            --bg: #0f172a;
            --text: white;
            --card: rgba(255, 255, 255, 0.08);
        }

        .light {
            --bg: #f9fafb;
            --text: #111;
            --card: white;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgba(255, 255, 255, 0.05);
        }

        /* LOGO */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 40px;
            border-radius: 6px;
        }

        nav a {
            margin-left: 20px;
            cursor: pointer;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 120px 20px;
            background: linear-gradient(135deg, #4F46E5, #06B6D4);
        }

        .hero img {
            height: 80px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        /* BUTTON */
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 12px;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* BACK BUTTON */
        .back-btn {
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            background: transparent;
        }

        /* SECTIONS */
        section {
            display: none;
            padding: 60px 10%;
        }

        .active {
            display: block;
        }

        /* FORM */
        .form-box {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            text-align: center;
            background: var(--card);
            border-radius: 12px;
        }

        input {
            width: 100%;
            margin: 12px 0;
            padding: 12px;
            border-radius: 6px;
            border: none;
        }

        /* CARD */
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
        }

        /* FLEX */
        .flex {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        /* DROP */
        .drop-zone {
            border: 2px dashed var(--secondary);
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
        }

        /* CHART */
        .chart {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: conic-gradient(#22C55E 0% 70%, #444 70%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center {
            display: flex;
            justify-content: center;
        }

        /* POPUP */
        .popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #22C55E;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">
            <img src="logo.png">
            <h2>InstaScreen</h2>
        </div>

        <div>
            <a onclick="showPage('home')">Home</a>
            <a onclick="showPage('login')">Login</a>
            <a onclick="showPage('signup')">Signup</a>
            <a onclick="showPage('upload')">Upload</a>
            <a onclick="showPage('dashboard')">Dashboard</a>
        </div>
    </nav>

    <div id="popup" class="popup">Login Successful ✅</div>

    <!-- HOME -->
    <section id="home" class="active">
        <div class="hero">
            <img src="logo.png">
            <h1>Smart Resume Screening</h1>
            <p>AI-powered hiring made simple</p>
            <button class="btn" onclick="showPage('signup')">Get Started</button>
        </div>
    </section>

    <!-- LOGIN -->
    <section id="login">
        <button class="back-btn" onclick="showPage('home')">← Back</button>

        <div class="form-box">
            <h2>Login</h2>
            <input id="loginEmail" placeholder="Email">
            <input id="loginPassword" type="password" placeholder="Password">
            <button class="btn" onclick="login()">Login</button>
        </div>
    </section>

    <!-- SIGNUP -->
    <section id="signup">
        <button class="back-btn" onclick="showPage('home')">← Back</button>

        <div class="form-box">
            <h2>Sign Up</h2>
            <input placeholder="Name">
            <input placeholder="Email">
            <input type="password" placeholder="Password">
            <button class="btn">Create Account</button>
        </div>
    </section>

    <!-- UPLOAD -->
    <section id="upload">
        <button class="back-btn" onclick="showPage('home')">← Back</button>

        <div class="form-box">
            <h2>Upload Resume</h2>
            <div class="drop-zone" id="dropZone">
                Drop file here or click
                <input type="file" id="resumeFile" hidden>
            </div>
        </div>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboard">
        <button class="back-btn" onclick="showPage('home')">← Back</button>

        <h2>Recruiter Dashboard</h2>

        <input id="filterInput" placeholder="Enter skill...">
        <button class="btn" onclick="filterCandidates()">Filter</button>

        <div id="candidateList" class="flex">
            <div class="card" data-skill="python">Python</div>
            <div class="card" data-skill="java">Java</div>
        </div>

        <div class="center">
            <div class="chart"><span id="percent">0%</span></div>
        </div>
    </section>

    <script>
        // NAVIGATION
        function showPage(id) {
            document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }

        // LOGIN POPUP
        function login() {
            let popup = document.getElementById("popup");
            popup.style.display = "block";

            setTimeout(() => popup.style.display = "none", 2000);
            setTimeout(() => showPage("dashboard"), 1000);
        }

        // DRAG DROP
        let drop = document.getElementById("dropZone");
        let fileInput = document.getElementById("resumeFile");

        drop.onclick = () => fileInput.click();

        drop.addEventListener("drop", e => {
            e.preventDefault();
            drop.innerHTML = "Resume Uploaded ✅";
        });

        // FILTER
        function filterCandidates() {
            let input = document.getElementById("filterInput").value.toLowerCase();
            let cards = document.querySelectorAll(".card[data-skill]");

            let count = 0;

            cards.forEach(card => {
                if (card.getAttribute("data-skill").includes(input)) {
                    card.style.display = "block";
                    count++;
                } else {
                    card.style.display = "none";
                }
            });

            document.getElementById("percent").innerText = (count / cards.length) * 100 + "%";
        }
    </script>

</body>

</html>
